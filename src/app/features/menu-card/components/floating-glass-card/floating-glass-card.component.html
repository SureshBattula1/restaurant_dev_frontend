<article class="glass-card">
  <div class="glass-img">
    <img *ngIf="item.image_url" [src]="item.image_url" [alt]="item.name" loading="lazy" />
    <div *ngIf="!item.image_url" class="glass-placeholder"><span>{{ item.name.charAt(0) }}</span></div>
  </div>
  <div class="glass-body">
    <h3 class="glass-title">{{ item.name }}</h3>
    <p class="glass-desc" *ngIf="item.description">{{ item.description }}</p>
    <span class="glass-price">₹{{ item.display_price | number:'1.2-2' }}</span>
    <button type="button" class="glass-order-btn" (click)="onOrder()">Order</button>
  </div>
</article>
