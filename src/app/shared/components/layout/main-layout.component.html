<mat-sidenav-container class="main-layout" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <mat-sidenav 
    #sidenav 
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? false : true"
    class="sidebar"
    [class.collapsed]="!sidebarOpen"
    [style.width.px]="sidebarOpen ? 280 : 80">
    <div class="sidebar-header">
      <div class="sidebar-logo" *ngIf="sidebarOpen">
        <img [src]="logoImageUrl" alt="Restaurant Logo" class="logo-image">
      </div>
      <button mat-icon-button (click)="toggleSidebar()" class="sidebar-toggle">
        <mat-icon>{{ sidebarOpen ? 'chevron_left' : 'chevron_right' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <mat-nav-list>
        <ng-container *ngFor="let item of menuItems">
          <ng-container *ngIf="item.children?.length; else singleItem">
            <h3 matSubheader *ngIf="sidebarOpen" class="nav-group-label">{{ item.label }}</h3>
            <a
              *ngFor="let child of item.children"
              mat-list-item
              [routerLink]="child.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{exact: child.route === '/cash-register'}"
              class="nav-link nav-link-child"
              (click)="onNavItemClick(sidenav)">
              <mat-icon matListItemIcon>{{ getMaterialIcon(child.route) }}</mat-icon>
              <span matListItemTitle *ngIf="sidebarOpen">{{ child.label }}</span>
            </a>
          </ng-container>
          <ng-template #singleItem>
            <a
              mat-list-item
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{exact: false}"
              class="nav-link"
              (click)="onNavItemClick(sidenav)">
              <mat-icon matListItemIcon>{{ getMaterialIcon(item.route) }}</mat-icon>
              <span matListItemTitle *ngIf="sidebarOpen">{{ item.label }}</span>
            </a>
          </ng-template>
        </ng-container>
      </mat-nav-list>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="sidebarOpen">
        <div class="user-avatar">
          <mat-icon>account_circle</mat-icon>
        </div>
        <div class="user-details">
          <p class="user-name">{{ currentUser && currentUser.name }}</p>
          <mat-chip *ngIf="currentUser && currentUser.roles && currentUser.roles.length > 0">
            {{ currentUser.roles[0].name }}
          </mat-chip>
        </div>
      </div>
      <button mat-icon-button (click)="logout()" [matTooltip]="sidebarOpen ? 'Logout' : ''">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content
    class="main-content"
    [class.collapsed]="!sidebarOpen"
    [class.hidden-when-drawer-open]="isMobile && sidenav.opened">
    <!-- Mobile Top Bar -->
    <mat-toolbar class="top-toolbar" *ngIf="isMobile">
      <button mat-icon-button (click)="sidenav.open()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="top-toolbar-title">Menu</span>
    </mat-toolbar>

    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
