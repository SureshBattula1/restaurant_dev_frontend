<div class="loader-container" [class.overlay]="overlay" [class.inline]="inline">
  <div class="loader-wrapper" [class]="'size-' + size">
    <div class="loader-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
    </div>
    <p class="loader-message" *ngIf="message">{{ message }}</p>
  </div>
</div>
